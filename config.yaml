# FridgePinventory Configuration File

# Database Configuration
database:
  path: "~/.local/share/fridgepinventory/inventory.db"  # Override with FRIDGE_DATABASE__PATH if needed
  
# Display Configuration
display:
  font:
    path: "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
    size: 22
    fallback_size: 16
  layout:
    items_per_row: 3  # 3-wide gives lozenges enough width for the longest names at 22px
    lozenge_height: 70
    spacing: 15
    margin: 20
  colors:
    background: "white"
    text: "black"
    border_normal: "black"
    border_low_stock: "gray"  # grayscale panel: must be visibly darker than background
    low_stock_threshold: 2
  clear_on_shutdown: false
  max_stale_seconds: 300.0
  show_startup_message: false

# Audio Configuration
audio:
  voice_recognition:
    timeout: 5
    phrase_time_limit: 10
    recognition_grace: 15.0  # extra seconds allowed for the engine to decode audio
    engine: "sphinx"  # Options: sphinx, google
    sphinx_grammar: true  # constrain Sphinx decoding to the command grammar
    device_index: 1  # USB PnP mic on the appliance Pi (mic_test.py survey); null = system default
  text_to_speech:
    rate: 150
    volume: 0.9
    voice_id: 1  # use debug/mic_test.py to check which works better
  feedback_sounds:
    success_sound: "sounds/success.wav"
    error_sound: "sounds/error.wav"
    warning_sound: "sounds/error.wav"

# Command Processing Configuration
commands:
  similarity_threshold: 0.8
  special_quantities:
    a: 1
    an: 1
    few: 3
    several: 3

# System Configuration
system:
  main_loop_delay: 0.1  # seconds
  motion_check_interval: 0.5  # seconds
  idle_delay: 1.0  # seconds
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  enable_diagnostics: true
  activation_mode: "auto"  # auto, motion, simulation, always_listen, manual
  simulation_voice_interval: 5.0  # seconds between voice attempts without motion hardware
  listen_window_seconds: 20.0  # keep listening this long after the last motion reading
  
# Hardware Configuration
hardware:
  motion_sensor:
    enabled: true
    pin: 4  # GPIO pin number
  display:
    enabled: true
    auto_detect: true
    type: "Waveshare_397"  # Waveshare 3.97" e-Paper HAT+
    resolution: "800x480"
    grayscale_levels: 4  # 4-level grayscale support

# Natural Language Processing Configuration
nlp:
  spacy_model: "en_core_web_sm"  # spaCy model name
  enable_spacy: true  # Whether to use spaCy for command processing

# Database Configuration (Advanced)
database_advanced:
  timeout: 30.0  # Connection timeout in seconds
  wal_mode: "WAL"  # Enable WAL journal mode for better concurrency
  cache_size: 1000  # SQLite cache size
  synchronous_mode: "NORMAL"  # NORMAL, FULL, or OFF
  temp_store: "memory"  # memory or file

# Platform Detection
platform:
  raspberry_pi_model_file: "/proc/device-tree/model"  # File to check for Pi detection
  required_pi_string: "raspberry pi"  # String that must be in model file
